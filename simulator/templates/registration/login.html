<!DOCTYPE html>
<html>
<head>
<title>ODTS Login</title>
<style>
body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    margin:0;
}
.box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}
h1{
    text-align:center;
    margin-bottom:25px;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}
button,.btn-link{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    display:block;
    text-align:center;
    text-decoration:none;
    box-sizing:border-box;
}
.login-btn{
    background:#06b6d4;
    color:white;
}
.login-btn:hover{
    background:#0891b2;
}
.register-btn{
    background:#22c55e;
    color:white;
    margin-top:12px;
}
.register-btn:hover{
    background:#16a34a;
}
.small{
    text-align:center;
    margin-top:15px;
    color:#cbd5e1;
}
</style>
</head>
<body>

<div class="box">
    <h1>🔐 ODTS Login</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <input type="hidden" name="next" value="{{ next }}">

        <button type="submit" class="login-btn">Login to Dashboard</button>
    </form>

    <a href="/api/register/" class="btn-link register-btn">📝 New User? Register</a>

    <div class="small">
        First register, then login to access dashboard
    </div>
</div>

</body>
</html>
